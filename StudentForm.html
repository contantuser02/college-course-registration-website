<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
</head>
<body>
    
    <!--  Registration Form Starts  -->

<h2 id="Registration">📝 Student Registration Form</h2>

<form action="">

<fieldset>
<legend><b>Personal Information</b></legend>

<label for="fname">First Name :</label><br>
<input type="text" id="fname" name="fname" placeholder="Enter First Name" required><br><br>

<label for="lname">Last Name :</label><br>
<input type="text" id="lname" name="lname" placeholder="Enter Last Name" required><br><br>

<label for="email">Email :</label><br>
<input type="email" id="email" name="email" placeholder="Enter Email"><br><br>

<label for="mobile">Mobile Number :</label><br>
<input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile Number"><br><br>

<label>Date of Birth :</label><br>
<input type="date"><br><br>

<label>Gender :</label><br>

<input type="radio" name="gender" id="male">
<label for="male">Male</label>

<input type="radio" name="gender" id="female">
<label for="female">Female</label>

<input type="radio" name="gender" id="other">
<label for="other">Other</label>

<br><br>

<label>Address :</label><br>

<textarea rows="5" cols="40" placeholder="Enter Your Address"></textarea>

</fieldset>

<br>

<fieldset>

<legend><b>Course Details</b></legend>

<label>Select Course :</label><br>

<select>

<option>Choose Course</option>
<option>Computer Science Engineering</option>
<option>Information Technology</option>
<option>Artificial Intelligence</option>
<option>Cyber Security</option>
<option>Data Science</option>
<option>Mechanical Engineering</option>
<option>Civil Engineering</option>

</select>

<br><br>

<label>Preferred Batch :</label><br>

<select>

<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>

</select>

<br><br>

<label>Qualification :</label><br>

<select>

<option>10th</option>
<option>12th</option>
<option>Diploma</option>
<option>Graduate</option>

</select>

<br><br>

<label>Skills :</label><br>

<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
<input type="checkbox"> C Programming
<input type="checkbox"> Java
<input type="checkbox"> Python

</fieldset>

<br>

<fieldset>

<legend><b>Additional Details</b></legend>

<label>Upload Passport Photo :</label><br>

<input type="file"><br><br>

<label>Upload Resume :</label><br>

<input type="file"><br><br>

<label>Password :</label><br>

<input type="password" placeholder="Password"><br><br>

<label>Confirm Password :</label><br>

<input type="password" placeholder="Confirm Password"><br><br>

<label>Preferred Class Timing :</label><br>

<input type="time"><br><br>

<label>Admission Month :</label><br>

<input type="month"><br><br>

<label>Admission Week :</label><br>

<input type="week"><br><br>

<label>Favorite Color :</label><br>

<input type="color"><br><br>

<label>Course Satisfaction :</label><br>

<input type="range" min="1" max="10"><br><br>

<label>Portfolio Website :</label><br>

<input type="url" placeholder="https://example.com"><br><br>

<label>Search Course :</label><br>

<input type="search" placeholder="Search Here"><br><br>

</fieldset>

<br>

<input type="checkbox" required>

I agree to the Terms & Conditions.

<br><br>

<input type="submit" value="Register Now">

<input type="reset" value="Clear Form">

</form>

</body>
</html>
